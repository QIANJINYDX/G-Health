      /* 语音输入动画样式 */
      .voice-animation {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
      }
      
      .voice-icon {
        position: relative;
        z-index: 2;
        animation: pulse 1.5s ease-in-out infinite;
      }
      
      .voice-waves {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
        width: 60px;
        height: 60px;
      }
      
      .wave {
        position: absolute;
        border: 2px solid #0d6efd;
        border-radius: 50%;
        animation: wave 2s ease-out infinite;
        opacity: 0;
        width: 16px;
        height: 16px;
      }
      
      /* 加载动画样式 */
      .loading-dots {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      
      .loading-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: #6c757d;
        animation: loading-dots 1.4s infinite ease-in-out both;
      }
      
      .loading-dots span:nth-child(1) {
        animation-delay: -0.32s;
      }
      
      .loading-dots span:nth-child(2) {
        animation-delay: -0.16s;
      }
      
      @keyframes loading-dots {
        0%, 80%, 100% {
          transform: scale(0);
          opacity: 0.5;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }
      
      .wave1 {
        width: 16px;
        height: 16px;
        animation-delay: 0s;
      }
      
      .wave2 {
        width: 20px;
        height: 20px;
        animation-delay: 0.5s;
      }
      
      .wave3 {
        width: 24px;
        height: 24px;
        animation-delay: 1s;
      }
      
      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.8;
        }
      }
      
      @keyframes wave {
        0% {
          transform: translate(-50%, -50%) scale(0.5);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(1.5);
          opacity: 0;
        }
      }
      
      /* 语音输入按钮激活状态 */

    <!-- Bootstrap 5 JS -->
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script>
        // 配置marked.js选项
        marked.setOptions({
            breaks: true,           // 支持GitHub风格的换行
            gfm: true,              // 启用GitHub风格的Markdown
            headerIds: false,       // 不添加标题ID
            mangle: false,          // 不转义内联HTML
            sanitize: false,        // 允许HTML标签
            smartLists: true,       // 智能列表
            smartypants: true,      // 智能标点符号
            xhtml: false            // 不使用XHTML
        });
        
        // 文本预处理函数
        function preprocessText(text) {
            if (!text) return text;
            
            return text
                // 去除形如 \n---\n 的分割线
                .replace(/\n\s*---\s*\n/g, '\n')
                // 去除形如 \n***\n 的分割线
                .replace(/\n\s*\*\*\*\s*\n/g, '\n')
                // 去除形如 \n___\n 的分割线
                .replace(/\n\s*___\s*\n/g, '\n')
                // 清理多余的空行
                .replace(/\n{3,}/g, '\n\n');
        }
        
        let currentSessionId = null;
        let ragEnabled = false;
        let deepThinkEnabled = false;
        let selectedModel = 'qwen3:32b'; // 默认模型

        // 加载Ollama模型列表
        async function loadOllamaModels() {
            try {
                const modelSelect = document.getElementById('model-select');
                const modelSelectMobile = document.getElementById('model-select-mobile');
                
                if (!modelSelect && !modelSelectMobile) {
                    console.error('模型选择器元素未找到');
                    return;
                }
                
                // 显示加载状态
                const loadingOption = '<option value="">加载中...</option>';
                if (modelSelect) {
                    modelSelect.innerHTML = loadingOption;
                    modelSelect.disabled = true;
                }
                if (modelSelectMobile) {
                    modelSelectMobile.innerHTML = loadingOption;
                    modelSelectMobile.disabled = true;
                }
                
                const response = await fetch('/api/v1/chat/models');
                const data = await response.json();
                
                // 清空现有选项
                if (modelSelect) {
                    modelSelect.innerHTML = '';
                    modelSelect.disabled = false;
                }
                if (modelSelectMobile) {
                    modelSelectMobile.innerHTML = '';
                    modelSelectMobile.disabled = false;
                }
                
                // 辅助函数：填充模型选项
                const populateModelSelect = (selectElement) => {
                    if (!selectElement) return;
                    
                    if (data.status === 'success' && data.models && data.models.length > 0) {
                        // 从localStorage恢复之前选择的模型
                        const savedModel = localStorage.getItem('selectedOllamaModel');
                        let hasSelectedModel = false;
                        
                        // 添加所有检测到的模型选项
                        data.models.forEach(model => {
                            const option = document.createElement('option');
                            option.value = model.name;
                            option.textContent = model.name;
                            
                            // 如果模型名称匹配保存的模型或默认模型，设置为选中
                            if (savedModel && model.name === savedModel) {
                                option.selected = true;
                                selectedModel = savedModel;
                                hasSelectedModel = true;
                            } else if (!hasSelectedModel && model.name === selectedModel) {
                                option.selected = true;
                                hasSelectedModel = true;
                            }
                            
                            selectElement.appendChild(option);
                        });
                        
                        // 如果保存的模型或默认模型不在列表中，添加它
                        const modelToCheck = savedModel || selectedModel;
                        if (!data.models.find(m => m.name === modelToCheck)) {
                            const defaultOption = document.createElement('option');
                            defaultOption.value = modelToCheck;
                            defaultOption.textContent = modelToCheck + ' (未安装)';
                            defaultOption.selected = true;
                            selectElement.insertBefore(defaultOption, selectElement.firstChild);
                            selectedModel = modelToCheck;
                        } else if (savedModel) {
                            selectedModel = savedModel;
                        }
                    } else {
                        // 如果没有检测到模型，显示错误提示
                        const errorOption = document.createElement('option');
                        errorOption.value = selectedModel;
                        errorOption.textContent = '未检测到模型';
                        errorOption.disabled = true;
                        selectElement.appendChild(errorOption);
                        
                        // 添加默认模型选项
                        const defaultOption = document.createElement('option');
                        defaultOption.value = selectedModel;
                        defaultOption.textContent = selectedModel + ' (默认)';
                        defaultOption.selected = true;
                        selectElement.appendChild(defaultOption);
                    }
                };
                
                // 填充两个选择器
                populateModelSelect(modelSelect);
                populateModelSelect(modelSelectMobile);
                
                if (data.status === 'success' && data.models && data.models.length > 0) {
                    console.log(`成功加载 ${data.count || data.models.length} 个Ollama模型`);
                } else {
                    console.warn('未找到可用的Ollama模型，使用默认模型:', selectedModel);
                    if (data.message) {
                        console.error('错误信息:', data.message);
                    }
                }
            } catch (error) {
                console.error('加载Ollama模型列表失败:', error);
                const errorOption = document.createElement('option');
                errorOption.value = selectedModel;
                errorOption.textContent = '加载失败，使用默认模型';
                errorOption.selected = true;
                
                if (modelSelect) {
                    modelSelect.innerHTML = '';
                    modelSelect.appendChild(errorOption.cloneNode(true));
                    modelSelect.disabled = false;
                }
                if (modelSelectMobile) {
                    modelSelectMobile.innerHTML = '';
                    modelSelectMobile.appendChild(errorOption.cloneNode(true));
                    modelSelectMobile.disabled = false;
                }
            }
        }

        // 监听模型选择变化
        function setupModelSelector() {
            const modelSelect = document.getElementById('model-select');
            const modelSelectMobile = document.getElementById('model-select-mobile');
            
            // 辅助函数：设置选择器事件监听
            const setupSelectListener = (selectElement) => {
                if (!selectElement) return;
                
                selectElement.addEventListener('change', function() {
                    if (this.value && this.value !== '') {
                        selectedModel = this.value;
                        localStorage.setItem('selectedOllamaModel', selectedModel);
                        
                        // 同步更新另一个选择器
                        if (selectElement === modelSelect && modelSelectMobile) {
                            modelSelectMobile.value = selectedModel;
                        } else if (selectElement === modelSelectMobile && modelSelect) {
                            modelSelect.value = selectedModel;
                        }
                        
                        console.log('已选择模型:', selectedModel);
                    }
                });
            };
            
            // 设置两个选择器的事件监听
            setupSelectListener(modelSelect);
            setupSelectListener(modelSelectMobile);
        }

        function toggleDeepThink() {
            deepThinkEnabled = !deepThinkEnabled;
            const btn = document.getElementById('deep-think-button');
            if (deepThinkEnabled) {
                btn.classList.remove('btn-outline-secondary');
                btn.classList.add('btn-primary');
            } else {
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-outline-secondary');
            }

        function toggleRagStatus() {
            ragEnabled = !ragEnabled;
            const statusText = document.getElementById('rag-status-text');
            const knob = document.getElementById('rag-toggle-knob');
            const ragBtn = document.getElementById('rag-toggle-button');
            if (ragEnabled) {

                statusText.textContent = i18n.t('ragNotActivated');

                ragBtn.classList.remove('btn-primary');

        function updateLangButtons() {

            ids.forEach(id => {

        // 监听语言切换
        const originalSwitchLanguage = i18n.switchLanguage;
        i18n.switchLanguage = function(lang) {
            originalSwitchLanguage.call(this, lang);
            updateLangButtons();
            // 更新tooltip文本
            const tooltips = document.querySelectorAll('[data-i18n-title]');
            tooltips.forEach(el => {
                const key = el.getAttribute('data-i18n-title');
                const newTitle = i18n.t(key);
                
                // 如果Bootstrap tooltip已初始化，需要先销毁
                if (typeof bootstrap !== 'undefined' && bootstrap.Tooltip) {
                    const tooltipInstance = bootstrap.Tooltip.getInstance(el);
                    if (tooltipInstance) {
                        // 先隐藏并销毁现有的tooltip
                        tooltipInstance.hide();
                        tooltipInstance.dispose();
                    }
                }
                
                // 更新元素的title属性
                el.setAttribute('title', newTitle);
                el.setAttribute('data-bs-original-title', newTitle);
                
                // 重新创建tooltip（延迟一点确保DOM更新完成）
                setTimeout(() => {
                    if (typeof bootstrap !== 'undefined' && bootstrap.Tooltip) {
                        new bootstrap.Tooltip(el, {
                            title: newTitle

            // 更新RAG状态文本

        // 更新风险评估表单中的文本
        function updateRiskAssessmentForms() {

            document.querySelectorAll('.form-label small.text-muted').forEach(el => {
                if (el.textContent.includes('(数值)') || el.textContent.includes('(Numerical)')) {

                const select = option.closest('select');
                if (select) {
                    const label = document.querySelector(`label[for="${select.id}"]`);
                    if (label) {
                        const fieldDescription = label.textContent.replace(/\s*\(数值\)|\s*\(Numerical\)/g, '').trim();
                        option.textContent = `${i18n.t('pleaseSelect')} ${fieldDescription}`;
                    }
                }
            });
            
            // 更新所有input的placeholder
            document.querySelectorAll('input.form-control').forEach(input => {
                const label = document.querySelector(`label[for="${input.id}"]`);
                if (label) {
                    const fieldDescription = label.textContent.replace(/\s*\(数值\)|\s*\(Numerical\)/g, '').trim();
                    input.placeholder = `${i18n.t('pleaseEnter')} ${fieldDescription}`;
                }
            });
            
            // 更新按钮文本
            document.querySelectorAll('.btn-primary').forEach(btn => {
                const btnText = btn.textContent.trim();
                if (btnText.includes('更新评估') || btnText.includes('Update Assessment')) {
                    btn.innerHTML = btn.innerHTML.replace(/更新评估|Update Assessment/g, i18n.t('updateAssessment'));
                } else if (btnText.includes('提交评估') || btnText.includes('Submit Assessment')) {
                    btn.innerHTML = btn.innerHTML.replace(/提交评估|Submit Assessment/g, i18n.t('submitAssessment'));

            document.querySelectorAll('.badge.bg-info').forEach(badge => {
                if (badge.textContent.includes('修改模式') || badge.textContent.includes('Update Mode')) {
                    badge.textContent = i18n.t('updateMode');
                }
            });
            
            // 更新历史评估标签
            document.querySelectorAll('small.text-muted').forEach(el => {
                if (el.textContent.includes('历史评估:') || el.textContent.includes('History Assessment:')) {
                    const timeMatch = el.textContent.match(/:\s*(.+)$/);
                    if (timeMatch) {
                        el.textContent = `${i18n.t('historyAssessment')}: ${timeMatch[1]}`;
                    }

        // 加载用户信息
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/v1/auth/user-info');
                const userData = await response.json();
                
                if (userData.username) {
                    // 获取用户名的第一个字符作为头像显示
                    const initial = userData.username.charAt(0);
                    document.getElementById('user-initials').textContent = initial;
                    document.getElementById('user-initials-mobile').textContent = initial;

        // 加载聊天历史
        async function loadChatHistory() {
            try {
                const response = await fetch('/api/v1/chat/sessions');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const sessions = await response.json();
                
                const chatHistory = document.getElementById('chat-history');
                const chatHistoryMobile = document.getElementById('chat-history-mobile');
                chatHistory.innerHTML = '';
                chatHistoryMobile.innerHTML = '';
                
                sessions.forEach(session => {
                    // 如果标题是"新对话"，根据当前语言显示对应翻译
                    const displayTitle = (session.title === '新对话' || session.title === 'New Conversation') 
                        ? i18n.t('newConversation') 
                        : session.title;
                    
                    // 创建桌面端会话项
                    const historyItem = document.createElement('a');
                    historyItem.className = `list-group-item list-group-item-action ${session.id === currentSessionId ? 'active' : ''}`;
                    historyItem.href = '#';
                    historyItem.dataset.sessionId = session.id;
                    historyItem.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center">
                        <span>${displayTitle}</span>
                            <button class="btn btn-sm btn-light" onclick="deleteSession(${session.id}, event)">
                                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="14" width="14">
                                <path d="M3 6h18"></path>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                        </div>
                    `;
                    historyItem.onclick = (e) => {
                        console.log('Desktop session clicked:', session.id);
                        if (!e.target.closest('.btn')) {
                            loadSession(session.id);
                        }
                    };
                    chatHistory.appendChild(historyItem);
                    
                    // 创建移动端会话项
                    const historyItemMobile = document.createElement('a');
                    historyItemMobile.className = `list-group-item list-group-item-action ${session.id === currentSessionId ? 'active' : ''}`;
                    historyItemMobile.href = '#';
                    historyItemMobile.dataset.sessionId = session.id;
                    historyItemMobile.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center">
                            <span>${displayTitle}</span>
                            <button class="btn btn-sm btn-light" onclick="deleteSession(${session.id}, event)">
                                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="14" width="14">
                                    <path d="M3 6h18"></path>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                                    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </div>
                    `;
                    historyItemMobile.onclick = (e) => {
                        console.log('Mobile session clicked:', session.id);
                        if (!e.target.closest('.btn')) {
                            loadSession(session.id);
                            // 在移动端关闭侧边栏
                            const offcanvas = bootstrap.Offcanvas.getInstance(document.getElementById('sidebarOffcanvas'));
                            if (offcanvas) {
                                offcanvas.hide();
                            }
                        }
                    };
                    chatHistoryMobile.appendChild(historyItemMobile);
                });

                // 如果没有当前会话，创建新会话
                if (!currentSessionId && sessions.length === 0) {
                    createNewChat();
                } else if (!currentSessionId && sessions.length > 0) {
                    loadSession(sessions[0].id);
                }
            } catch (error) {
                console.error('Error loading chat history:', error);
                // 显示错误提示
                const chatHistory = document.getElementById('chat-history');
                const chatHistoryMobile = document.getElementById('chat-history-mobile');
                const errorMsg = `<div class="text-center text-muted py-2">${i18n.t('loadFailedRetry')}</div>`;
                chatHistory.innerHTML = errorMsg;
                chatHistoryMobile.innerHTML = errorMsg;
            }
        }

        // 创建新对话
        async function createNewChat() {
            try {
                const response = await fetch('/api/v1/chat/sessions', {
                    method: 'POST'
                });
                const session = await response.json();
                currentSessionId = session.id;
                clearMessages();
                // 重新加载聊天历史以显示新会话
                await loadChatHistory();
            } catch (error) {
                console.error('Error creating new chat:', error);
            }
        }

        // 加载特定会话
        async function loadSession(sessionId) {
            console.log('Loading session:', sessionId);
            
            // 先更新当前会话ID
            currentSessionId = sessionId;
            
            // 清空渲染缓存，确保所有消息都能重新渲染
            renderedMessageIds.clear();
            
            try {
                // 显示加载状态
                const chatMessages = document.getElementById('chat-messages');
                chatMessages.innerHTML = `
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden" data-i18n="loading">${i18n.t('loading')}</span>
                        </div>
                        <div class="mt-2 text-muted" data-i18n="loadingConversation">${i18n.t('loadingConversation')}</div>
                    </div>
                `;
                
                const response = await fetch(`/api/v1/chat/sessions/${sessionId}/messages`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const messages = await response.json();
                
                // 清空消息容器
                chatMessages.innerHTML = '';
                
                // 确保DOM完全清空后再添加新内容
                await new Promise(resolve => setTimeout(resolve, 0));
                
                if (messages.length === 0) {
                    // 显示欢迎消息
                    chatMessages.innerHTML = `
                        <div class="card rounded-3">
                            <div class="card-body text-center" data-i18n="welcomeMessage">
                                ${i18n.t('welcomeMessage')}
                            </div>
                        </div>
                    `;
                    i18n.updatePage();
                } else {
                                    // 批量渲染消息，避免频繁的DOM操作
                const fragment = document.createDocumentFragment();
                messages.forEach(message => {
                    // 调试：检查消息数据
                    if (message.role === 'assistant' && message.follow_up_questions) {
                        console.log('发现AI消息包含引导问题:', message.id, message.follow_up_questions);
                    }
                    const messageElement = createMessageElement(message);
                    if (messageElement) {
                        fragment.appendChild(messageElement);
                    }
                });
                chatMessages.appendChild(fragment);
                }
                
                // 更新活动状态 - 使用data-session-id属性
                document.querySelectorAll('.list-group-item').forEach(item => {
                    item.classList.remove('active');
                    if (item.dataset.sessionId == sessionId) {
                        item.classList.add('active');
                        console.log('Set active session:', sessionId, 'for element:', item);
                    }
                });
                
                // 滚动到底部
                setTimeout(() => {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }, 100);
                
            } catch (error) {
                console.error('Error loading session:', error);
                // 显示错误消息
                const chatMessages = document.getElementById('chat-messages');
                chatMessages.innerHTML = `
                    <div class="alert alert-danger">
                        <strong>${i18n.t('loadFailed')}</strong><br>
                        ${i18n.t('loadConversationFailed')}
                    </div>
                `;
            }
        }

        // 删除会话
        async function deleteSession(sessionId, event) {
            event.stopPropagation();
            const confirmMsg = i18n.t('deleteChat');
            if (!confirm(confirmMsg)) {
                return;
            }
            
            try {
                await fetch(`/api/v1/chat/sessions/${sessionId}`, {
                    method: 'DELETE'
                });
                
                if (currentSessionId === sessionId) {
                    currentSessionId = null;
                }
                
                loadChatHistory();
            } catch (error) {
                console.error('Error deleting session:', error);
            }
        }

        // 清空消息显示
        function clearMessages() {
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML = `
                <div class="card rounded-3">
                    <div class="card-body text-center welcome-message" data-i18n="welcomeMessage">
                        ${i18n.t('welcomeMessage')}
                    </div>
                </div>
            `;
            i18n.updatePage();
        }

        // 创建消息元素（用于批量渲染）
        function createMessageElement(message) {
            if (message.id && renderedMessageIds.has(message.id)) {
                return null;
            }
            if (message.id) {
                renderedMessageIds.add(message.id);
            }
            
            // 调试信息
            if (message.display_mode === 'workflow') {
                console.log('处理工作流消息:', message.id, message.display_mode, message.stages);
            }
            
            // 创建一个包装容器来包含消息和引导问题
            const wrapperContainer = document.createElement('div');
            wrapperContainer.className = 'message-wrapper';
            
            const messageContainer = document.createElement('div');
            messageContainer.className = `${message.role === 'user' ? 'text-end' : ''} mb-3 message-container`;
            if (message.id) {
                messageContainer.dataset.messageId = message.id;
            }
            
            const messageCard = document.createElement('div');
            if (message.role === 'user') {
                messageCard.className = 'user-message-card ms-auto';
                const contentDiv = document.createElement('div');
                contentDiv.className = 'p-2';
                contentDiv.style.backgroundColor = 'transparent';
                contentDiv.style.border = 'none';
                contentDiv.innerHTML = message.content
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/\n+/g, '<br>');
                messageCard.appendChild(contentDiv);
            } else {
                messageCard.className = 'card bg-white';
                messageCard.style.maxWidth = '100%';
                messageCard.style.width = '100%';
                
                // 相关资料卡片
                if (message.references && message.references.length > 0) {
                    const refDiv = document.createElement('div');
                    refDiv.className = 'alert alert-warning mb-2';
                    refDiv.style.backgroundColor = '#fff';
                    refDiv.style.border = 'none';
                    refDiv.style.display = 'block';
                    const refHeader = document.createElement('div');
                    refHeader.style.display = 'flex';
                    refHeader.style.alignItems = 'center';
                    refHeader.style.gap = '8px';
                    refHeader.style.cursor = 'pointer';
                    refHeader.style.marginBottom = '8px';
                    refHeader.style.color = '#666';
                    refHeader.style.fontSize = '16px';
                    refHeader.style.fontWeight = 'bold';
                    refHeader.innerHTML = `
                        <span style="color:inherit;font-size:14px;font-weight:normal;">展开相关资料</span>
                        <span class="ref-toggle-icon" style="color:inherit;font-size:14px;">▼</span>
                    `;
                    const refContent = document.createElement('div');
                    refContent.style.display = 'none';
                    message.references.forEach(ref => {
                        const refItem = document.createElement('div');
                        refItem.className = 'card mb-2';
                        refItem.style.backgroundColor = '#fff';
                        refItem.style.border = 'none';
                        refItem.style.color = '#888';
                        refItem.style.fontSize = '14px';
                        refItem.style.borderLeft = '4px solid #ddd';
                        refItem.style.paddingLeft = '12px';
                        let cleanedContent = preprocessText(ref.content)
                            .replace(/\\uf357|[\uf357]/g, ' ')
                            .replace(/\\u2003|[\u2003]/g, '&emsp;');
                        refItem.innerHTML = `<div class="card-body p-2" style="background-color:#fff;border:none;">${cleanedContent}</div>`;
                        refContent.appendChild(refItem);
                    });
                    refHeader.onclick = function() {
                        const isHidden = refContent.style.display === 'none';
                        refContent.style.display = isHidden ? 'block' : 'none';
                        refHeader.querySelector('.ref-toggle-icon').textContent = isHidden ? '▲' : '▼';
                    };
                    refDiv.appendChild(refHeader);
                    refDiv.appendChild(refContent);
                    messageCard.appendChild(refDiv);
                }
                
                // AI消息：分离<think>内容
                const thinkMatch = message.content.match(/<think>([\s\S]*?)<\/think>/i);
                let mainContent = message.content;
                let thinkContent = null;
                if (thinkMatch) {
                    thinkContent = thinkMatch[1].trim();
                    mainContent = message.content.replace(thinkMatch[0], '').trim();
                }
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'card-body p-2';
                
                // 思考内容
                if (thinkContent) {
                    const thinkDiv = document.createElement('div');
                    thinkDiv.className = 'alert alert-info mb-2';
                    thinkDiv.style.backgroundColor = '#fff';
                    thinkDiv.style.border = 'none';
                    thinkDiv.style.display = 'block';
                    const tipDiv = document.createElement('div');
                    tipDiv.style.fontWeight = 'bold';
                    tipDiv.style.color = '#666';
                    tipDiv.style.marginBottom = '4px';
                    tipDiv.style.cursor = 'pointer';
                    tipDiv.innerHTML = `<span style="color:inherit;font-size:14px;font-weight:normal;" data-i18n="deepThinkActivated">${i18n.t('deepThinkActivated')}</span> <span class="think-toggle-icon" style="color:inherit;font-size:14px;">▲</span>`;
                    thinkDiv.appendChild(tipDiv);
                    const thinkContentDiv = document.createElement('div');
                    thinkContentDiv.style.color = '#888';
                    thinkContentDiv.style.fontSize = '14px';
                    thinkContentDiv.style.borderLeft = '4px solid #ddd';
                    thinkContentDiv.style.paddingLeft = '12px';
                    thinkContentDiv.innerHTML = marked.parse(thinkContent);
                    thinkDiv.appendChild(thinkContentDiv);
                    tipDiv.onclick = function() {
                        if (thinkContentDiv.style.display === 'none') {
                            thinkContentDiv.style.display = '';
                            tipDiv.querySelector('.think-toggle-icon').textContent = '▲';
                        } else {
                            thinkContentDiv.style.display = 'none';
                            tipDiv.querySelector('.think-toggle-icon').textContent = '▼';
                        }
                    };
                    contentDiv.appendChild(thinkDiv);
                }
                
                // 主内容 - 支持工作流阶段渲染
                if (mainContent) {
                    if (message.display_mode === 'workflow' && message.stages && Array.isArray(message.stages) && message.stages.length > 0) {
                        // 渲染工作流阶段：默认折叠，仅保留折叠卡片展示
                        const stages = message.stages;
                        const lastIndex = stages.length - 1;
                        stages.forEach((stage, idx) => {
                            const isSummary = /总结/.test(stage.title) || /阶段\s*7/.test(stage.title) || idx === lastIndex;
                            
                            // 所有阶段统一采用折叠卡片展示，默认收起，结尾阶段默认展开
                                const stageCard = document.createElement('div');
                                stageCard.className = 'alert alert-primary mb-2';
                                stageCard.style.backgroundColor = '#fff';
                                stageCard.style.border = 'none';

                                const header = document.createElement('div');
                                header.style.display = 'flex';
                                header.style.alignItems = 'center';
                                header.style.cursor = 'pointer';
                                header.style.userSelect = 'none';
                                header.style.color = '#666';
                                header.style.fontWeight = 'bold';
                                header.style.marginBottom = '4px';
                                header.innerHTML = `
                                <span style="color:inherit;font-size:14px;font-weight:normal;">${stage.title || (i18n.t('stage') + (idx + 1))}</span>
                                <span class="stage-toggle-icon" style="color:inherit;font-size:14px;margin-left:6px;">${isSummary ? '▲' : '▼'}</span>
                                `;

                                const stageContent = document.createElement('div');
                                stageContent.className = 'stage-content';
                                stageContent.style.color = '#333';
                                stageContent.style.fontSize = '14px';
                                stageContent.style.borderLeft = '4px solid #ddd';
                                stageContent.style.paddingLeft = '12px';
                            stageContent.style.display = isSummary ? '' : 'none';
                                stageContent.innerHTML = marked.parse(preprocessText(stage.content || ''));

                                header.onclick = function () {
                                    const isHidden = stageContent.style.display === 'none';
                                    stageContent.style.display = isHidden ? '' : 'none';
                                    header.querySelector('.stage-toggle-icon').textContent = isHidden ? '▲' : '▼';
                                };

                                stageCard.appendChild(header);
                                stageCard.appendChild(stageContent);
                                contentDiv.appendChild(stageCard);
                        });
                    } else {
                        // 普通消息渲染
                        const replyDiv = document.createElement('div');
                        replyDiv.className = 'alert alert-primary mb-2';
                        replyDiv.style.backgroundColor = '#fff';
                        replyDiv.style.border = 'none';
                        replyDiv.innerHTML = marked.parse(mainContent);
                        contentDiv.appendChild(replyDiv);
                    }
                }
                
                // 图片渲染（AI消息）
                if (message.has_image && message.image_data) {
                    const img = document.createElement('img');
                    img.src = message.image_data;
                    img.className = 'img-fluid mb-2';
                    img.style.maxWidth = '320px';
                    img.style.cursor = 'pointer';
                    img.alt = i18n.t('aiGeneratedImage');
                    img.setAttribute('data-i18n-alt', 'aiGeneratedImage');
                    img.onclick = function() {
                        showImageModal(message.image_data);
                    };
                    contentDiv.appendChild(img);
                }
                
                messageCard.appendChild(contentDiv);
            }
            
            messageContainer.appendChild(messageCard);

            // 如果是AI回复且有引导问题，创建引导问题容器
            if (message.role === 'assistant' && message.follow_up_questions && message.follow_up_questions.length > 0) {
                console.log('创建引导问题容器:', message.id, message.follow_up_questions);
                console.log('messageContainer:', messageContainer);
                
                const followUpContainer = document.createElement('div');
                followUpContainer.className = 'd-flex justify-content-start mb-3';
                followUpContainer.innerHTML = `
                    <div class="follow-up-questions" style="margin-bottom: 12px;">
                        ${message.follow_up_questions.map((question, index) => `
                            <button class="btn btn-outline-secondary btn-sm me-2 mb-2 follow-up-btn" 
                                    onclick="sendFollowUpQuestion('${question.replace(/'/g, "\\'")}')"
                                    style="font-size: 0.95rem; white-space: normal; text-align: left; height: auto; min-height: 32px;">
                                ${question}
                            </button>
                        `).join('')}
                    </div>
                `;
                console.log('followUpContainer:', followUpContainer);
                
                // 将消息容器和引导问题容器都添加到包装容器中
                wrapperContainer.appendChild(messageContainer);
                wrapperContainer.appendChild(followUpContainer);
            } else {
                // 如果没有引导问题，只添加消息容器
                wrapperContainer.appendChild(messageContainer);
            }

            // 如果是风险评估消息，添加评估按钮
            if (message.message_type === 3 && message.risk_model !== null) {
                const buttonsContainer = document.createElement('div');
                buttonsContainer.className = 'd-flex gap-2 mt-2';
                
                const startButton = document.createElement('button');
                startButton.className = 'btn btn-success btn-sm';
                startButton.setAttribute('data-i18n-button', 'startAssessment');
                startButton.innerHTML = `
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    ${i18n.t('startAssessment')}
                `;
                
                const closeButton = document.createElement('button');
                closeButton.className = 'btn btn-secondary btn-sm';
                closeButton.setAttribute('data-i18n-button', 'endAssessment');
                closeButton.style.display = 'none'; // 初始隐藏
                closeButton.innerHTML = `
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                    ${i18n.t('endAssessment')}
                `;
                
                startButton.onclick = () => {
                    showRiskAssessmentForm(message.risk_model, messageContainer);
                    startButton.style.display = 'none';
                    closeButton.style.display = 'inline-block';
                };
                
                closeButton.onclick = () => {
                    console.log('Close button clicked');
                    
                    // 通过类名查找风险评估表单
                    const riskAssessmentForm = messageContainer.querySelector('.risk-assessment-form');
                    
                    if (riskAssessmentForm) {
                        console.log('Removing risk assessment form');
                        riskAssessmentForm.remove();
                    } else {
                        console.log('No risk assessment form found to remove');
                        // 如果通过类名找不到，尝试通过表单ID查找
                        const form = messageContainer.querySelector(`#risk-form-${message.risk_model}`);
                        if (form) {
                            const formCard = form.closest('.card');
                            if (formCard) {
                                formCard.remove();
                            }
                        }
                    }
                    closeButton.style.display = 'none';
                    startButton.style.display = 'inline-block';
                };
                
                buttonsContainer.appendChild(startButton);
                buttonsContainer.appendChild(closeButton);
                messageContainer.appendChild(buttonsContainer);
            }

            // 只为历史消息（非流式）插入操作按钮
            if (message.role === 'assistant' && !message.is_streaming) {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'd-flex gap-2 mt-2';
                actionsDiv.innerHTML = `
                    <button class="btn-icon copy-btn" onclick="copyMessage(this)" data-i18n-title="copy" title="${i18n.t('copy')}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                        </svg>
                    </button>
                    <button class="btn-icon feedback-btn like" onclick="handleFeedback(this, 1)" data-i18n-title="like" title="${i18n.t('like')}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                            <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path>
                        </svg>
                    </button>
                    <button class="btn-icon feedback-btn dislike" onclick="handleFeedback(this, -1)" data-i18n-title="dislike" title="${i18n.t('dislike')}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                            <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-3"></path>
                        </svg>
                    </button>
                `;
                messageContainer.appendChild(actionsDiv);
            }
            
            return wrapperContainer;
        }

        // 添加消息到界面（用于实时添加新消息）
        function appendMessage(message, container) {
            const messageElement = createMessageElement(message);
            if (!messageElement) return;
            
            const chatMessages = document.getElementById('chat-messages');
            
            // 插入到消息列表
            if (container) {
                container.appendChild(messageElement);
            } else {
                chatMessages.appendChild(messageElement);
            }
            
            // 滚动到新消息位置
            setTimeout(() => {
                messageElement.scrollIntoView({ 
                    behavior: 'smooth', 
                    block: 'start',
                    inline: 'nearest'
                });
            }, 100);
        }

        // 复制消息内容
        function copyMessage(button) {
            const messageContent = button.closest('.mb-3').querySelector('.card-body').textContent;
            navigator.clipboard.writeText(messageContent).then(() => {
                const originalText = button.innerHTML;
                button.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                        <path d="M20 6L9 17l-5-5"></path>
                    </svg>
                    ${i18n.t('copied')}
                `;
                button.classList.remove('btn-outline-secondary');
                button.classList.add('btn-success');
                setTimeout(() => {
                    button.innerHTML = originalText;
                    button.classList.remove('btn-success');
                    button.classList.add('btn-outline-secondary');
                }, 2000);
            });
        }

        // 处理反馈
        async function handleFeedback(button, feedbackValue) {
            const messageContainer = button.closest('.mb-3');
            const messageId = messageContainer.dataset.messageId;
            const actionsDiv = button.closest('.d-flex');
            const likeBtn = actionsDiv.querySelector('.like');
            const dislikeBtn = actionsDiv.querySelector('.dislike');

            try {
                const response = await fetch(`/api/v1/chat/messages/${messageId}/feedback`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ feedback: feedbackValue })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || i18n.t('feedbackUpdateFailed'));
                }

                // 更新按钮状态
                if (feedbackValue === 1) {
                    likeBtn.classList.add('liked');
                    dislikeBtn.classList.remove('disliked');
                    dislikeBtn.style.display = 'none';
                } else {
                    dislikeBtn.classList.add('disliked');
                    likeBtn.classList.remove('liked');
                    likeBtn.style.display = 'none';
                }

                // 禁用已点击的按钮
                button.disabled = true;
            } catch (error) {
                console.error('Error:', error);
                alert(error.message || i18n.t('feedbackUpdateFailed'));
            }
        }

        // 文件选择处理
        let selectedFiles = new Map(); // 使用Map存储选中的文件

        document.getElementById('file-input').addEventListener('change', function(e) {
            const files = e.target.files;
            if (files.length > 0) {
                Array.from(files).forEach(file => {
                    const fileId = Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                    selectedFiles.set(fileId, file);
                    addFilePreview(fileId, file.name);
                });
                this.value = ''; // 清空input，允许重复选择相同文件
                
                // 更新发送按钮颜色
                const sendButton = document.getElementById('send-button');
                const messageInput = document.getElementById('message-input');
                const hasText = messageInput.value.trim().length > 0 || selectedFiles.size > 0;
                sendButton.style.color = hasText ? '#000' : '#ccc';
            }
        });
