                'ppt': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="9" y2="9"></line></svg>',
                'pptx': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="9" y2="9"></line></svg>'
            };
            return icons[fileType] || icons['txt'];
        }

        // 删除文件
        function removeFile(fileId) {
            selectedFiles.delete(fileId);
            const fileItem = document.querySelector(`[data-file-id="${fileId}"]`);
            if (fileItem) {
                fileItem.remove();
            }
            
            // 更新发送按钮颜色
            const sendButton = document.getElementById('send-button');
            const messageInput = document.getElementById('message-input');
            const hasText = messageInput.value.trim().length > 0 || selectedFiles.size > 0;
            sendButton.style.color = hasText ? '#000' : '#ccc';
        }

        // 发送引导问题的函数
        async function sendFollowUpQuestion(question) {
            // 设置输入框的值
            const messageInput = document.getElementById('message-input');
            messageInput.value = question;
            
            // 触发输入事件以更新发送按钮状态
            messageInput.dispatchEvent(new Event('input'));
            
            // 发送消息
            await sendMessage();
        }

        // 修改发送消息函数
        async function sendMessage() {
            // 先清除欢迎语（如果存在）
            const chatMessages = document.getElementById('chat-messages');
            if (
                chatMessages.children.length === 1 &&
                chatMessages.children[0].querySelector('.welcome-message')
            ) {
                chatMessages.innerHTML = '';
            }
            // 确保声明在最前面
            const messageInput = document.getElementById('message-input');
            const message = messageInput.value.trim();
            if ((!message && selectedFiles.size === 0) || !currentSessionId) return;
            
            // 使用流式发送
            await sendMessageStream();
        }

        // 流式发送消息函数
        async function sendMessageStream() {
            const messageInput = document.getElementById('message-input');
            const message = messageInput.value.trim();
            
            try {
                const formData = new FormData();
                let msg = message;
                let fileNames = '';
                if (selectedFiles.size > 0) {
                    fileNames = Array.from(selectedFiles.values()).map(file => file.name).join(', ');
                    msg = msg ? msg + `\n已上传文件：${fileNames}` : `已上传文件：${fileNames}`;
                }
                console.log("消息内容：", msg);
                formData.append('message', msg);
                formData.append('rag_enabled', ragEnabled ? '1' : '0');
                formData.append('deep_think', deepThinkEnabled ? '1' : '0');
                // 添加语言参数
                const currentLang = i18n.currentLang || 'zh';
                formData.append('language', currentLang);
                // 添加模型参数
                formData.append('model', selectedModel);
                // 添加文件到formData
                selectedFiles.forEach((file) => {
                    formData.append('files', file);
                });

                if (message) {
                    appendMessage({ role: 'user', content: message });
                }
                if (selectedFiles.size > 0) {
                    appendMessage({ role: 'user', content: `已上传文件：${fileNames}` });
                }

                // 清空输入框和文件
                messageInput.value = '';
                messageInput.style.height = 'auto';
                selectedFiles.clear();
                document.getElementById('file-preview').innerHTML = '';

                // 创建AI消息容器
                const aiMessageContainer = document.createElement('div');
                aiMessageContainer.className = 'mb-3 message-container';
                aiMessageContainer.innerHTML = `
                    <div class="card bg-white" style="max-width: 100%; width: 100%;">
                        <div class="card-body p-2">
                            <div id="ai-think"></div>
                            <div id="ai-main"></div>
                        </div>
                    </div>
                `;
                document.getElementById('chat-messages').appendChild(aiMessageContainer);
                
                // 创建加载动画容器
                const loadingContainer = document.createElement('div');
                loadingContainer.className = 'd-flex justify-content-start mb-3';
                loadingContainer.id = 'ai-loading-container';
                loadingContainer.innerHTML = `
                    <div class="card bg-white" style="max-width: 100%; width: 100%;">
                        <div class="card-body p-2">
                            <div class="d-flex align-items-center">
                                <div class="loading-dots me-2">
                                    <span></span>
                                    <span></span>
                                    <span></span>
                                </div>
                                <span class="text-muted">${i18n.t('aiThinking')}</span>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('chat-messages').appendChild(loadingContainer);
                
                // 滚动到底部
                document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;

                // 创建EventSource连接
                const response = await fetch(`/api/v1/chat/sessions/${currentSessionId}/messages`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let aiContent = '';
                let currentMessageId = null;
                let ragResponse = null;
                let references = null;
                let thinkRendered = false;
                let thinkContent = '';
                let mainContent = '';
                let referencesRendered = false;
                // 工作流阶段渲染控制
                let isWorkflow = false;
                let workflowStageIndex = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                console.log('SSE data:', data);

                                switch (data.type) {
                                    case 'start':
                                        console.log('开始处理消息');
                                        break;
                                        
                                    case 'file_processing_start':
                                        console.log('开始处理文件');
                                        break;
                                        
                                    case 'file_processing':
                                        console.log('处理文件:', data.filename);
                                        break;
                                        
                                    case 'file_processing_complete':
                                        console.log('文件处理完成');
                                        break;
                                        
                                    case 'ai_processing_start':
                                        console.log('开始AI处理');
                                        break;
                                    case 'report_workflow_start':
                                        console.log('开始报告工作流');
                                        isWorkflow = true;
                                        break;
                                        
                                    case 'rag_processing_start':
                                        console.log('开始RAG处理');
                                        break;
                                        
                                    case 'rag_processing_complete':
                                        console.log('RAG处理完成');
                                        break;
                                        
                                    case 'rag_references':
                                        console.log('收到RAG相关资料:', data.references);
                                        // 立即显示检索到的相关资料
                                        if (data.references && data.references.length > 0 && !referencesRendered) {
                                            const refDiv = document.createElement('div');
                                            refDiv.className = 'alert alert-warning mb-2';
                                            refDiv.style.backgroundColor = '#fff';
                                            refDiv.style.border = 'none';
                                            refDiv.style.display = 'block';
                                            const refHeader = document.createElement('div');
                                            refHeader.style.display = 'flex';
                                            refHeader.style.alignItems = 'center';
                                            refHeader.style.gap = '8px';
                                            refHeader.style.cursor = 'pointer';
                                            refHeader.style.marginBottom = '8px';
                                            refHeader.style.color = '#666';
                                            refHeader.style.fontSize = '16px';
                                            refHeader.style.fontWeight = 'bold';
                                            refHeader.innerHTML = `
                                                <span style="color:inherit;font-size:14px;font-weight:normal;">展开相关资料</span>
                                                <span class="ref-toggle-icon" style="color:inherit;font-size:14px;">▼</span>
                                            `;
                                            const refContent = document.createElement('div');
                                            refContent.style.display = 'none';
                                            data.references.forEach(ref => {
                                                const refItem = document.createElement('div');
                                                refItem.className = 'card mb-2';
                                                refItem.style.backgroundColor = '#fff';
                                                refItem.style.border = 'none';
                                                refItem.style.color = '#888';
                                                refItem.style.fontSize = '14px';
                                                refItem.style.borderLeft = '4px solid #ddd';
                                                refItem.style.paddingLeft = '12px';
                                                let cleanedContent = preprocessText(ref.content)
                                                    .replace(/\\uf357|[\uf357]/g, ' ')
                                                    .replace(/\\u2003|[\u2003]/g, '&emsp;');
                                                refItem.innerHTML = `<div class="card-body p-2" style="background-color:#fff;border:none;">${cleanedContent}</div>`;
                                                refContent.appendChild(refItem);
                                            });
                                            refHeader.onclick = function() {
                                                const isHidden = refContent.style.display === 'none';
                                                refContent.style.display = isHidden ? 'block' : 'none';
                                                refHeader.querySelector('.ref-toggle-icon').textContent = isHidden ? '▲' : '▼';
                                            };
                                            refDiv.appendChild(refHeader);
                                            refDiv.appendChild(refContent);
                                            // 插入到ai-think之前
                                            const aiThinkDiv = aiMessageContainer.querySelector('#ai-think');
                                            aiThinkDiv.parentNode.insertBefore(refDiv, aiThinkDiv);
                                            referencesRendered = true;
                                            
                                            // 滚动到底部以显示相关资料
                                            setTimeout(() => {
                                                const chatMessages = document.getElementById('chat-messages');
                                                chatMessages.scrollTop = chatMessages.scrollHeight;
                                            }, 0);
                                        }
                                        break;
                                        
                                    case 'stage':
                                        isWorkflow = true;
                                        if (data.title && data.content !== undefined) {
                                            // 确保消息容器存在
                                            let aiContainer = aiMessageContainer;
                                            if (!aiContainer) {
                                                aiContainer = document.createElement('div');
                                                aiContainer.className = 'mb-3 ai-message-container';
                                                aiContainer.innerHTML = `
                                                    <div class="card rounded-3">
                                                        <div class="card-body ai-message-body" style="background-color: #f8f9fa;">
                                                            <div id="ai-main"></div>
                                                        </div>
                                                    </div>
                                                `;
                                                document.getElementById('chat-messages').appendChild(aiContainer);
                                                aiMessageContainer = aiContainer;
                                            }

                                            let aiMainDiv = aiContainer.querySelector('#ai-main');
                                            if (!aiMainDiv) {
                                                aiMainDiv = document.createElement('div');
                                                aiMainDiv.id = 'ai-main';
                                                aiContainer.querySelector('.ai-message-body')?.appendChild(aiMainDiv);
                                            }

                                            const title = data.title;
                                            const contentText = data.content || '';
                                            const stageCard = document.createElement('div');
                                            stageCard.className = 'alert alert-primary mb-2';
                                            stageCard.style.backgroundColor = '#fff';
                                            stageCard.style.border = 'none';

                                            const header = document.createElement('div');
                                            header.style.display = 'flex';
                                            header.style.alignItems = 'center';
                                            header.style.cursor = 'pointer';
                                            header.style.userSelect = 'none';
                                            header.style.color = '#666';
                                            header.style.fontWeight = 'bold';
                                            header.style.marginBottom = '4px';
                                            header.innerHTML = `
                                                <span style="color:inherit;font-size:14px;font-weight:normal;">${title}</span>
                                                <span class="stage-toggle-icon" style="color:inherit;font-size:14px;margin-left:6px;">▼</span>
                                            `;

                                            const contentDiv = document.createElement('div');
                                            contentDiv.className = 'stage-content';
                                            contentDiv.style.color = '#333';
                                            contentDiv.style.fontSize = '14px';
                                            contentDiv.style.borderLeft = '4px solid #ddd';
                                            contentDiv.style.paddingLeft = '12px';
                                            contentDiv.style.display = 'none';
                                            contentDiv.innerHTML = marked.parse(contentText);

                                            header.onclick = function () {
                                                const isHidden = contentDiv.style.display === 'none';
                                                contentDiv.style.display = isHidden ? '' : 'none';
                                                header.querySelector('.stage-toggle-icon').textContent = isHidden ? '▲' : '▼';
                                            };

                                            stageCard.appendChild(header);
                                            stageCard.appendChild(contentDiv);
                                            aiMainDiv.appendChild(stageCard);

                                            setTimeout(() => {
                                                const chatMessages = document.getElementById('chat-messages');
                                                chatMessages.scrollTop = chatMessages.scrollHeight;
                                            }, 0);
                                        }
                                        break;
                                        
                                    case 'content':
                                        if (data.content) {
                                            aiContent += data.content;
                                            if (isWorkflow) {
                                                // 解析阶段块：第一行作为标题
                                                const aiMainDiv = aiMessageContainer.querySelector('#ai-main');
                                                const chunkText = data.content.trim();
                                                if (chunkText.length > 0) {
                                                    workflowStageIndex += 1;
                                                    let title = chunkText.split('\n', 1)[0].replace(/^#+\s*/, '');
                                                    const isSummary = /总结/.test(title) || /阶段\s*7/.test(title);
                                                    
                                                    if (isSummary) {
                                                        // 最后一个阶段（总结）显示为正常消息
                                                        const replyDiv = document.createElement('div');
                                                        replyDiv.className = 'alert alert-primary mb-2';
                                                        replyDiv.style.backgroundColor = '#fff';
                                                        replyDiv.style.border = 'none';
                                                        replyDiv.innerHTML = marked.parse(chunkText);
                                                        aiMainDiv.appendChild(replyDiv);
                                                    } else {
                                                        // 工作流阶段统一折叠展示，默认收起
                                                        const stageCard = document.createElement('div');
                                                        stageCard.className = 'alert alert-primary mb-2';
                                                        stageCard.style.backgroundColor = '#fff';
                                                        stageCard.style.border = 'none';

                                                        const header = document.createElement('div');
                                                        header.style.display = 'flex';
                                                        header.style.alignItems = 'center';
                                                        header.style.cursor = 'pointer';
                                                        header.style.userSelect = 'none';
                                                        header.style.color = '#666';
                                                        header.style.fontWeight = 'bold';
                                                        header.style.marginBottom = '4px';
                                                        header.innerHTML = `
                                                            <span style="color:inherit;font-size:14px;font-weight:normal;">${title || (i18n.t('stage') + workflowStageIndex)}</span>
                                                            <span class="stage-toggle-icon" style="color:inherit;font-size:14px;margin-left:6px;">▼</span>
                                                        `;

                                                        const contentDiv = document.createElement('div');
                                                        contentDiv.className = 'stage-content';
                                                        contentDiv.style.color = '#333';
                                                        contentDiv.style.fontSize = '14px';
                                                        contentDiv.style.borderLeft = '4px solid #ddd';
                                                        contentDiv.style.paddingLeft = '12px';
                                                        contentDiv.style.display = 'none';
                                                        contentDiv.innerHTML = marked.parse(chunkText);

                                                        header.onclick = function () {
                                                            const isHidden = contentDiv.style.display === 'none';
                                                            contentDiv.style.display = isHidden ? '' : 'none';
                                                            header.querySelector('.stage-toggle-icon').textContent = isHidden ? '▲' : '▼';
                                                        };

                                                        stageCard.appendChild(header);
                                                        stageCard.appendChild(contentDiv);
                                                        aiMainDiv.appendChild(stageCard);
                                                    }

                                                    setTimeout(() => {
                                                        const chatMessages = document.getElementById('chat-messages');
                                                        chatMessages.scrollTop = chatMessages.scrollHeight;
                                                    }, 0);
                                                }
                                            } else {
                                                // 非工作流：保持原来的覆盖渲染方式
                                                const thinkMatch = aiContent.match(/<think>([\s\S]*?)<\/think>/i);
                                                mainContent = aiContent;
                                                thinkContent = null;
                                                if (thinkMatch) {
                                                    thinkContent = thinkMatch[1].trim();
                                                    mainContent = aiContent.replace(thinkMatch[0], '').trim();
                                                }
                                                if (thinkContent && !thinkRendered) {
                                                    const aiThinkDiv = aiMessageContainer.querySelector('#ai-think');
                                                    aiThinkDiv.innerHTML = '';
                                                    const thinkDiv = document.createElement('div');
                                                    thinkDiv.className = 'alert alert-info mb-2';
                                                    thinkDiv.style.backgroundColor = '#fff';
                                                    thinkDiv.style.border = 'none';
                                                    thinkDiv.style.display = 'block';
                                                    const tipDiv = document.createElement('div');
                                                    tipDiv.style.fontWeight = 'bold';
                                                    tipDiv.style.color = '#666';
                                                    tipDiv.style.marginBottom = '4px';
                                                    tipDiv.style.cursor = 'pointer';
                                                    tipDiv.innerHTML = `<span style=\"color:inherit;font-size:14px;font-weight:normal;\" data-i18n=\"deepThinkActivated\">${i18n.t('deepThinkActivated')}</span> <span class=\"think-toggle-icon\" style=\"color:inherit;font-size:14px;\">▲</span>`;
                                                    thinkDiv.appendChild(tipDiv);
                                                    const thinkContentDiv = document.createElement('div');
                                                    thinkContentDiv.style.color = '#888';
                                                    thinkContentDiv.style.fontSize = '14px';
                                                    thinkContentDiv.style.borderLeft = '4px solid #ddd';
                                                    thinkContentDiv.style.paddingLeft = '12px';
                                                    thinkContentDiv.innerHTML = marked.parse(thinkContent);
                                                    thinkDiv.appendChild(thinkContentDiv);
                                                    tipDiv.onclick = function() {
                                                        if (thinkContentDiv.style.display === 'none') {
                                                            thinkContentDiv.style.display = '';
                                                            tipDiv.querySelector('.think-toggle-icon').textContent = '▲';
                                                        } else {
                                                            thinkContentDiv.style.display = 'none';
                                                            tipDiv.querySelector('.think-toggle-icon').textContent = '▼';
                                                        }
                                                    };
                                                    aiThinkDiv.appendChild(thinkDiv);
                                                    thinkRendered = true;
                                                }
                                                const aiMainDiv = aiMessageContainer.querySelector('#ai-main');
                                                aiMainDiv.innerHTML = '';
                                                if (mainContent) {
                                                    const replyDiv = document.createElement('div');
                                                    replyDiv.className = 'alert alert-primary mb-2';
                                                    replyDiv.style.backgroundColor = '#fff';
                                                    replyDiv.style.border = 'none';
                                                    replyDiv.innerHTML = marked.parse(mainContent);
                                                    aiMainDiv.appendChild(replyDiv);
                                                }
                                                setTimeout(() => {
                                                    const chatMessages = document.getElementById('chat-messages');
                                                    chatMessages.scrollTop = chatMessages.scrollHeight;
                                                }, 0);
                                            }
                                        }
                                        break;
                                        
                                    case 'message_complete':
                                        currentMessageId = data.message_id;
                                        ragResponse = data.rag_response;
                                        references = data.references;
                                        console.log('消息完成:', currentMessageId);
                                        // 注意：相关资料现在在rag_references事件中处理，这里不再重复处理
                                        break;
                                        
                                    case 'risk_assessment':
                                        // 添加风险评估消息
                    appendMessage({ 
                                            id: data.message_id,
                                            content: data.content,
                        role: 'assistant', 
                                            message_type: 3,
                        risk_model: data.risk_model,
                        feedback_status: 0
                    });
                                        break;
                                        
                                    case 'image_message':
                                      console.log('图片消息:', data);
                                        // 拉取图片数据
                                        fetch(`/api/v1/chat/messages/${data.message_id}/image`)
                                          .then(res => res.json())
                                          .then(imgData => {
                                            data.image_data = imgData.image_data;
                                            // 创建图片消息DOM但不插入
                                            const tempDiv = document.createElement('div');
                                            appendMessage({
                                              id: data.message_id,
                                              content: data.content,
                                              role: 'assistant',
                                              message_type: 1,
                                              feedback_status: 0,
                                              has_image: true,
                                              image_data: data.image_data
                                            }, tempDiv);
                                            // 插入到当前AI回复消息块前面
                                            const chatMessages = document.getElementById('chat-messages');
                                            const aiMessageBlock = chatMessages.querySelector('.mb-3:last-child');
                                            if (aiMessageBlock) {
                                              chatMessages.insertBefore(tempDiv.firstChild, aiMessageBlock);
                                            } else {
                                              chatMessages.appendChild(tempDiv.firstChild);
                                            }
                                          });
                                        break;
                                        
                                    case 'follow_up_questions':
                                        console.log('流式结束，引导问题:', data.questions);
                                        // 隐藏加载动画
                                        const followUpLoadingContainer = document.getElementById('ai-loading-container');
                                        if (followUpLoadingContainer) {
                                            followUpLoadingContainer.remove();
                                        }
                                        
                                        // 添加引导问题（插入到最新AI消息卡片后面）
                                        if (data.questions && data.questions.length > 0) {
                                            const followUpContainer = document.createElement('div');
                                            followUpContainer.className = 'd-flex justify-content-start mb-3';
                                            followUpContainer.innerHTML = `
                                                <div class="follow-up-questions" style="margin-bottom: 12px;">
                                                    ${data.questions.map((question, index) => `
                                                        <button class=\"btn btn-outline-secondary btn-sm me-2 mb-2 follow-up-btn\" 
                                                                onclick=\"sendFollowUpQuestion('${question.replace(/'/g, "\\'")}')\"
                                                                style=\"font-size: 0.95rem; white-space: normal; text-align: left; height: auto; min-height: 32px;\">
                                                            ${question}
                                                        </button>
                                                    `).join('')}
                                                </div>
                                            `;
                                            // 找到最新的AI消息容器
                                            const containers = Array.from(document.querySelectorAll('.message-container'));
                                            let lastAIAssistant = null;
                                            
                                            // 从后往前查找最新的AI消息容器
                                            for (let i = containers.length - 1; i >= 0; i--) {
                                                const container = containers[i];
                                                const messageCard = container.querySelector('.card');
                                                if (messageCard && !container.querySelector('.user-message-card')) {
                                                    // 这是一个AI消息容器
                                                    lastAIAssistant = container;
                                                    break;
                                                }
                                            }
                                            
                                            // 如果找不到，使用当前正在处理的aiMessageContainer
                                            if (!lastAIAssistant && aiMessageContainer) {
                                                lastAIAssistant = aiMessageContainer;
                                            }
                                            
                                            if (lastAIAssistant) {
                                                lastAIAssistant.after(followUpContainer);
                                            } else {
                                                // 兜底：加到消息底部
                                                document.getElementById('chat-messages').appendChild(followUpContainer);
                                            }
                                        }
                                        break;
                                        
                                    case 'complete':
                                        console.log('所有处理完成');
                                        // 隐藏加载动画（如果没有引导问题的话）
                                        const completeLoadingContainer = document.getElementById('ai-loading-container');
                                        if (completeLoadingContainer) {
                                            completeLoadingContainer.remove();
                                        }
                                        
                                        // 为AI消息添加操作按钮
                                        if (currentMessageId) {
                                            aiMessageContainer.dataset.messageId = currentMessageId;
                                            // 先移除已存在的actionsDiv（防止重复）
                                            const oldActions = aiMessageContainer.querySelector('.d-flex.gap-2.mt-2');
                                            if (oldActions) oldActions.remove();
                                            const actionsDiv = document.createElement('div');
                                            actionsDiv.className = 'd-flex gap-2 mt-2';

        // 修改提交风险评估的代码
        async function submitRiskAssessment(modelId, formContainer, existingAssessmentId = null) {
            try {
                const form = formContainer.querySelector(`#risk-form-${modelId}`);
                const formData = {};
                form.querySelectorAll('input, select').forEach(input => {
                    if (!input.value) {
                        throw new Error(`${i18n.t('pleaseFill')} ${input.placeholder || input.previousElementSibling.textContent}`);
                    }
                    formData[input.name] = input.value;
                });
                // 添加语言参数
                const currentLang = i18n.currentLang || 'zh';
                formData['language'] = currentLang;
                
                const submitButton = formContainer.querySelector('.btn-primary');
                const isUpdateMode = existingAssessmentId !== null;
                
                submitButton.disabled = true;
                submitButton.innerHTML = `
                    <div class="spinner-border spinner-border-sm me-2" role="status">
                        <span class="visually-hidden">Loading...</span>

                    ${isUpdateMode ? i18n.t('updating') : i18n.t('assessing')}

                // 根据是否为更新模式选择不同的API端点
                let apiUrl = `/api/v1/chat/risk-assessment/${modelId}/${currentSessionId}/predict`;
                let method = 'POST';

                //     apiUrl = `/api/v1/chat/risk-assessment/${existingAssessmentId}/update`;
                //     method = 'PUT';

                const response = await fetch(apiUrl, {
                    method: method,
                    headers: {

                    },
                    body: JSON.stringify(formData)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);

                const result = await response.json();
                
                // 显示结果

                // 如果有 SHAP 图片，添加到结果卡片中
                if (result.shap_html) {

                // 更新提交按钮状态

        async function exportReport() {
            if (!currentSessionId) {
                alert(i18n.t('pleaseSelectChat'));
                return;
            }

            const exportButton = document.getElementById('export-button');
            const originalContent = exportButton.innerHTML;
            
            try {

                exportButton.disabled = true;
                exportButton.innerHTML = `
                    <div class="spinner-border spinner-border-sm me-2" role="status">

                    </div>
                    ${i18n.t('exporting')}
                `;

                // 添加语言参数
                const currentLang = i18n.currentLang || 'zh';
                const response = await fetch(`/api/v1/chat/sessions/${currentSessionId}/export?language=${currentLang}`, {
                    method: 'GET'
                });

                if (!response.ok) {
                    throw new Error(i18n.t('exportFailed'));
                }

                // 检查响应类型
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/pdf')) {
                    // 如果是PDF文档，直接下载
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    
                    // 获取文件名
                    const contentDisposition = response.headers.get('Content-Disposition');
                    let filename = 'health_report.pdf';
                    if (contentDisposition) {
                        const filenameMatch = contentDisposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
                        if (filenameMatch && filenameMatch[1]) {
                            filename = filenameMatch[1].replace(/['"]/g, '');
                        }
                    }
                    
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                } else {
                    // 如果是Markdown格式，显示在页面上
                    const data = await response.json();
                    if (data.format === 'markdown') {
                        // 创建模态框显示报告
                        const modal = new bootstrap.Modal(document.createElement('div'));
                        const modalElement = document.createElement('div');
                        modalElement.className = 'modal fade';
                        modalElement.innerHTML = `
                            <div class="modal-dialog modal-lg">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5 class="modal-title">健康报告</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                    </div>
                                    <div class="modal-body">
                                        <div id="report-content"></div>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                                        <button type="button" class="btn btn-primary" onclick="downloadMarkdown()">下载Markdown</button>
                                    </div>
                                </div>
                            </div>
                        `;
                        document.body.appendChild(modalElement);
                        
                        const reportContent = modalElement.querySelector('#report-content');
                        // 预处理文本
                        const processedReport = preprocessText(data.report);
                        reportContent.innerHTML = marked.parse(processedReport); // 使用marked.js转换Markdown
                        
                        const modalInstance = new bootstrap.Modal(modalElement);
                        modalInstance.show();
                        
                        // 清理模态框
                        modalElement.addEventListener('hidden.bs.modal', () => {
                            document.body.removeChild(modalElement);
                        });
                        
                        // 下载Markdown函数
                        window.downloadMarkdown = function() {
                            const blob = new Blob([data.report], { type: 'text/markdown' });
                            const url = window.URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = 'health_report.md';
                            document.body.appendChild(a);
                            a.click();
                            window.URL.revokeObjectURL(url);
                            document.body.removeChild(a);
                        };
                    }
                }
            } catch (error) {
                console.error('Export error:', error);
                alert(i18n.t('exportFailed'));
            } finally {
                // 恢复按钮状态
                exportButton.disabled = false;
                exportButton.innerHTML = originalContent;
            }
        }

        // 测试SSE连接
        async function testSSE() {
            try {
                console.log('Testing SSE connection...');
                const response = await fetch('/api/v1/chat/test-sse');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                console.log('SSE test data:', data);
                                
                                if (data.type === 'content') {
                                    console.log('Received content:', data.content);
                                } else if (data.type === 'complete') {
                                    console.log('SSE test completed');
                                    return;
                                }
                            } catch (e) {
                                console.error('解析SSE测试数据失败:', e, line);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('SSE test error:', error);
            }
        }

        function syncFakeScrollbar() {
            const chat = document.getElementById('chat-messages');
            const fake = document.getElementById('fake-scrollbar');
            const thumb = fake.querySelector('.thumb');
            const contentHeight = chat.scrollHeight;
            const visibleHeight = chat.clientHeight;
            const scrollRatio = visibleHeight / contentHeight;
            const thumbHeight = Math.max(visibleHeight * scrollRatio, 30);
            thumb.style.height = thumbHeight + 'px';
            // thumb位置
            const maxScroll = contentHeight - visibleHeight;
            const top = (chat.scrollTop / maxScroll) * (visibleHeight - thumbHeight);
            thumb.style.top = (isNaN(top) ? 0 : top) + 'px';
            // 显示/隐藏
            if (contentHeight <= visibleHeight) {
                fake.style.display = 'none';
            } else {
                fake.style.display = 'block';
            }

            const contentHeight = chat.scrollHeight;
            const maxScroll = contentHeight - visibleHeight;
            const thumbHeight = thumb.offsetHeight;
            const delta = e.clientY - startY;
            const newTop = Math.min(Math.max(0, (startScroll / maxScroll) * (visibleHeight - thumbHeight) + delta), visibleHeight - thumbHeight);
            const newScroll = (newTop / (visibleHeight - thumbHeight)) * maxScroll;
            chat.scrollTop = newScroll;
        });

                        throw new Error(`HTTP error! status: ${response.status}`);

                    allHistoryData = data.assessments;

                // 应用筛选
                applyModelFilter();

                applyPagination(page);

                document.getElementById('risk-history-content').innerHTML = `

            // 计算分页信息
            const total = filteredHistoryData.length;
            const pages = Math.ceil(total / perPage);
            const hasNext = page < pages;
            const hasPrev = page > 1;
            
            historyPagination = {
                page: page,
                per_page: perPage,
                total: total,
                pages: pages,
                has_next: hasNext,
                has_prev: hasPrev
            };

                                        ${new Date(assessment.created_at).toLocaleString()}
                                    </div>
                                    <button class="btn btn-sm btn-outline-light ms-2" onclick="deleteRiskAssessment(${assessment.id})" data-i18n-title="deleteRecord" title="删除记录">
                                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M3 6h18"></path>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                                            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="assessment-body">
                            <div class="row g-4">
                                <div class="col-lg-6">
                                    <div class="info-section">
                                        <div class="section-header">
                                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" class="me-2">
                                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                                <polyline points="14 2 14 8 20 8"></polyline>
                                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                                <polyline points="10 9 9 9 8 9"></polyline>
                                            </svg>
                                            <h6 class="mb-0" data-i18n="predictionResult">预测结果</h6>
                                        </div>
                                        <div class="prediction-content">
                                            <div class="prediction-label mb-3">
                                                <span class="prediction-text">${assessment.prediction_label || assessment.prediction}</span>
                                            </div>
                                            ${assessment.probability ? `
                                                <div class="probability-section">
                                                    <div class="probability-label mb-2">
                                                        <span class="text-muted" data-i18n="predictionConfidence">${i18n.t('predictionConfidence')}</span>
                                                        <span class="probability-value">${(assessment.probability * 100).toFixed(1)}%</span>
                                                    </div>
                                                    <div class="progress-custom mb-2">
                                                        <div class="progress-bar-custom ${riskInfo.progressClass}" 
                                                             style="width: ${assessment.probability * 100}%"></div>
                                                    </div>
                                                    <small class="text-muted" data-i18n="confidenceNote">置信度越高，预测结果越可靠</small>
                                                </div>
                                            ` : ''}
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="col-lg-6">
                                    <div class="info-section">
                                        <div class="section-header">
                                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" class="me-2">
                                                <path d="M9 11H1l8-8 8 8h-8v8"></path>
                                                <path d="M3 19h18"></path>
                                            </svg>
                                            <h6 class="mb-0" data-i18n="formData">表单数据</h6>
                                        </div>
                                        <div class="form-data-grid">
                                            ${Object.entries(assessment.form_data).map(([key, value]) => `
                                                <div class="form-data-item">
                                                    <span class="form-data-key">${key}</span>
                                                    <span class="form-data-value">${value}</span>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            ${assessment.nurse_response ? `
                                <div class="info-section mt-4">
                                    <div class="section-header">
                                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" class="me-2">
                                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                                        </svg>
                                        <h6 class="mb-0" data-i18n="nurseAdvice">护士建议</h6>
                                    </div>
                                    <div class="nurse-response-content">
                                        ${nurseResponseHtml}
                                    </div>
                                </div>
                            ` : ''}
                            
                            ${assessment.shap_plot ? `
                                <div class="info-section mt-4">
                                    <div class="section-header">
                                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" class="me-2">
                                            <path d="M3 3v18h18"></path>
                                            <path d="M18.7 8l-5.1 5.9-3.8-3.7L7 14.3"></path>
                                        </svg>
                                        <h6 class="mb-0" data-i18n="featureImportanceAnalysis">特征重要性分析</h6>
                                    </div>
                                    <div class="shap-plot-container">
                                        <img src="data:image/png;base64,${assessment.shap_plot.replace(/^data:image\/\w+;base64,/, '')}" 
                                             alt="${i18n.t('featureImportanceAnalysis')}" class="shap-plot-image">
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = historyHtml;
            // 更新多语言文本
            i18n.updatePage();
        }
        
        // 获取风险等级信息和样式
        function getRiskLevelInfo(prediction, probability) {
            const predictionLower = prediction.toLowerCase();
            
            if (predictionLower.includes('低') || predictionLower.includes('low') || predictionLower.includes('正常')) {
                return {
                    bgClass: 'bg-success',
                    badgeClass: 'badge-success',
                    progressClass: 'progress-success',
                    icon: '✅'
                };
            } else if (predictionLower.includes('中') || predictionLower.includes('medium') || predictionLower.includes('中等')) {
                return {
                    bgClass: 'bg-warning',
                    badgeClass: 'badge-warning',
                    progressClass: 'progress-warning',
                    icon: '⚠️'
                };
            } else if (predictionLower.includes('高') || predictionLower.includes('high') || predictionLower.includes('危险')) {
                return {
                    bgClass: 'bg-danger',
                    badgeClass: 'badge-danger',
                    progressClass: 'progress-danger',
                    icon: '🚨'
                };
            } else {
                return {
                    bgClass: 'bg-info',
                    badgeClass: 'badge-info',
                    progressClass: 'progress-info',
                    icon: 'ℹ️'
                };
            }
        }
        
        // 更新分页信息
        function updateHistoryPagination() {
            if (!historyPagination) return;
            
            const { page, per_page, total, pages, has_next, has_prev } = historyPagination;
            
            document.getElementById('history-pagination-info').textContent = 
                i18n.t('paginationInfo', { total, page, pages });
            document.getElementById('history-page-info').textContent = i18n.t('pageInfo', { page, pages });
            
            // 每页1条记录时的分页按钮状态
            document.getElementById('history-prev-btn').disabled = !has_prev;
            document.getElementById('history-next-btn').disabled = !has_next;
            
            // 如果只有1条记录，隐藏分页信息
            if (total <= 1) {
                document.getElementById('history-pagination-info').style.display = 'none';
                document.getElementById('history-page-info').style.display = 'none';
                document.getElementById('history-prev-btn').style.display = 'none';
                document.getElementById('history-next-btn').style.display = 'none';
            } else {
                document.getElementById('history-pagination-info').style.display = 'block';
                document.getElementById('history-page-info').style.display = 'block';
                document.getElementById('history-prev-btn').style.display = 'inline-block';
                document.getElementById('history-next-btn').style.display = 'inline-block';
            }
        }
        
        // 切换历史记录页面
        function changeHistoryPage(delta) {
            const newPage = currentHistoryPage + delta;
            if (newPage >= 1 && newPage <= historyPagination.pages) {
                currentHistoryPage = newPage;
                applyPagination(newPage);
            }
        }
        
        // 删除风险评估记录
        async function deleteRiskAssessment(assessmentId) {
            const confirmMsg = i18n.t('deleteRiskAssessment');
            if (!confirm(confirmMsg)) {
                return;
            }
            
            try {
                const response = await fetch(`/api/v1/chat/risk-assessment/${assessmentId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                // 重新加载当前页面
                loadRiskHistory(currentHistoryPage);
                
            } catch (error) {
                console.error('Error deleting risk assessment:', error);
            alert(i18n.t('deleteFailed') + error.message);
            }
        }
        
        // 初始化函数
        function initializeApp() {
          // 在这里添加初始化逻辑
        }
    </script>
</body>
